<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdata — Registrer markarbejde</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-ikon">🌾</div>
        <span class="logo-tekst">Markdata</span>
      </div>

      <nav class="sidebar-nav">
        <a href="index.html" class="nav-punkt">
          <span class="nav-ikon">⊞</span>
          <span>Overblik</span>
        </a>
        <a href="registrer.html" class="nav-punkt">
          <span class="nav-ikon">＋</span>
          <span>Registrer levering</span>
        </a>
        <a href="mine-leveringer.html" class="nav-punkt">
          <span class="nav-ikon">☰</span>
          <span>Mine leveringer</span>
        </a>
        <a href="registrer-mark.html" class="nav-punkt aktiv">
          <span class="nav-ikon">⚙</span>
          <span>Markarbejde</span>
        </a>
        <a href="marker.html" class="nav-punkt">
          <span class="nav-ikon">◈</span>
          <span>Marker</span>
        </a>
      </nav>

      <div class="sidebar-bund">
        <div class="bruger-info">
          <div class="bruger-avatar" id="bruger-avatar">—</div>
          <div class="bruger-detaljer">
            <span class="bruger-navn" id="bruger-navn">—</span>
            <span class="bruger-rolle" id="bruger-rolle"></span>
          </div>
        </div>
        <button class="log-ud-knap" id="log-ud-knap">Log ud</button>
      </div>
    </aside>

    <!-- HOVEDINDHOLD -->
    <main class="hoved-indhold">
      <div class="topbar">
        <div class="velkomst">
          <h1 class="velkomst-titel">Registrer markarbejde</h1>
          <p class="velkomst-dato" id="velkomst-dato"></p>
        </div>
      </div>

      <div class="formular-wrapper">
        <div class="sektion formular-sektion">
          <div class="sektion-header">
            <h2 class="sektion-titel">Nyt markarbejde</h2>
          </div>

          <div class="formular-indhold">

            <!-- Operation -->
            <div class="form-gruppe">
              <label for="operation">Operation</label>
              <div class="select-wrapper">
                <select id="operation" class="form-select">
                  <option value="">Vælg operation...</option>
                  <option value="Pløjning">Pløjning</option>
                  <option value="Harvning">Harvning</option>
                  <option value="Tromling">Tromling</option>
                  <option value="Såning">Såning</option>
                  <option value="Høst">Høst</option>
                </select>
              </div>
            </div>

            <!-- Korntype — vises kun ved Såning -->
            <div class="form-gruppe" id="korntype-gruppe" style="display:none">
              <label for="korn">Kornsort der sås</label>
              <div class="select-wrapper">
                <select id="korn" class="form-select">
                  <option value="">Henter korntyper...</option>
                </select>
              </div>
            </div>

            <!-- Mark -->
            <div class="form-gruppe">
              <label for="mark">Mark</label>
              <div class="select-wrapper">
                <select id="mark" class="form-select">
                  <option value="">Henter marker...</option>
                </select>
              </div>
            </div>

            <!-- Maskine -->
            <div class="form-gruppe">
              <label for="maskine">Maskine / Traktor</label>
              <div class="select-wrapper">
                <select id="maskine" class="form-select">
                  <option value="">Henter maskiner...</option>
                </select>
              </div>
            </div>

            <!-- Noter -->
            <div class="form-gruppe">
              <label for="noter">Noter <span class="valgfri">(valgfrit)</span></label>
              <textarea
                id="noter"
                class="form-input form-textarea"
                placeholder="Eventuelle bemærkninger..."
                rows="3"
              ></textarea>
            </div>

            <!-- Fejl og succes -->
            <div class="fejlbesked" id="fejlbesked"></div>
            <div class="succesbesked" id="succesbesked"></div>

            <!-- Knapper -->
            <div class="form-knapper">
              <button class="knap-sekundaer" onclick="window.location.href='index.html'">
                Annuller
              </button>
              <button class="knap" id="gem-knap">
                Gem markarbejde
              </button>
            </div>

          </div>
        </div>
      </div>
    </main>

    <script src="registrer-mark.js"></script>
  </body>
</html>
